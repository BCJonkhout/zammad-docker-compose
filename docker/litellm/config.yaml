model_list:
  - model_name: gemini-support
    litellm_params:
      model: vertex_ai/gemini-3-flash-preview
      vertex_project: os.environ/VERTEXAI_PROJECT_ID
      vertex_location: os.environ/VERTEXAI_LOCATION
      vertex_credentials: /etc/secrets/prudai-a6715982179f.json
  - model_name: gemini-support-fallback
    litellm_params:
      model: vertex_ai/gemini-2.5-flash
      vertex_project: os.environ/VERTEXAI_PROJECT_ID
      vertex_location: os.environ/VERTEXAI_LOCATION
      vertex_credentials: /etc/secrets/prudai-a6715982179f.json

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - {"gemini-support": ["gemini-support-fallback"]}
  max_fallbacks: 1

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  json_logs: true
