---
x-prudai-zammad-image: &prudai-zammad-image
  image: prudai/zammad-support:${VERSION:-7.0.0-0042}
  build:
    context: ./docker/zammad-assets
    args:
      BASE_IMAGE: ${IMAGE_REPO:-ghcr.io/zammad/zammad}:${VERSION:-7.0.0-0042}

services:
  zammad-backup:
    <<: *prudai-zammad-image
    environment:
      PRUDAI_ASSET_VERSION: 20260327-8

  zammad-init:
    <<: *prudai-zammad-image
    environment:
      PRUDAI_ASSET_VERSION: 20260327-8

  zammad-nginx:
    <<: *prudai-zammad-image
    environment:
      PRUDAI_ASSET_VERSION: 20260327-8

  zammad-railsserver:
    <<: *prudai-zammad-image
    environment:
      PRUDAI_ASSET_VERSION: 20260327-8

  zammad-scheduler:
    <<: *prudai-zammad-image
    environment:
      PRUDAI_ASSET_VERSION: 20260327-8

  zammad-websocket:
    <<: *prudai-zammad-image
    environment:
      PRUDAI_ASSET_VERSION: 20260327-8

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: ${RESTART:-always}
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LOG: INFO
      VERTEXAI_PROJECT_ID: ${VERTEXAI_PROJECT_ID}
      VERTEXAI_LOCATION: ${VERTEXAI_LOCATION}
      GOOGLE_APPLICATION_CREDENTIALS: /etc/secrets/prudai-a6715982179f.json
    ports:
      - "127.0.0.1:14000:4000"
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
      - ./secrets/prudai-a6715982179f.json:/etc/secrets/prudai-a6715982179f.json:ro

  zammad-autoreply:
    image: prudai/zammad-autoreply:${VERSION:-7.0.0-0042}
    build:
      context: ./docker/autoreply
    restart: ${RESTART:-always}
    env_file:
      - ./docs-sync.env
    environment:
      PORT: 8081
      ZAMMAD_INTERNAL_BASE_URL: http://zammad-nginx:8080
      ZAMMAD_PUBLIC_BASE_URL: https://${ZAMMAD_FQDN}
      ZAMMAD_AUTOREPLY_TOKEN_FILE: /run/prudai-secrets/autoreply.token
      ZAMMAD_AUTOREPLY_WEBHOOK_TOKEN_FILE: /run/prudai-secrets/autoreply-webhook.token
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_MODEL: gemini-support
    depends_on:
      - litellm
      - zammad-nginx
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./secrets:/run/prudai-secrets:ro
